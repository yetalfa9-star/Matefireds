<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juego Matemático Suma y Resta</title>


<style>


body{

font-family:sans-serif;

text-align:center;

margin:0;

transition:background 2s;

}



header{

background:#ff6b6b;

color:white;

padding:25px;

font-size:1.5rem;

}



.practicas{

display:flex;

flex-wrap:wrap;

justify-content:center;

gap:30px;

padding:30px;

}



.box{

background:white;

padding:30px;

border-radius:25px;

box-shadow:0 10px 25px rgba(0,0,0,.25);

max-width:550px;

width:90%;

}



.pregunta{

font-size:40px;

margin:20px;

}



button{


padding:15px 25px;

margin:10px;

border:none;

border-radius:25px;

background:#27ae60;

color:white;

font-size:18px;

cursor:pointer;


}



.btn-rojo{

background:#e74c3c;

}



.opciones{


display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

margin:20px;


}



.opcion{


padding:20px;

border-radius:20px;

color:white;

font-size:22px;

cursor:pointer;

transition:.3s;


}



.opcion:nth-child(1){

background:#3498db;

}


.opcion:nth-child(2){

background:#9b59b6;

}


.opcion:nth-child(3){

background:#f39c12;

}


.opcion:nth-child(4){

background:#1abc9c;

}


.opcion:nth-child(5){

background:#e84393;

}



.correcta{


background:#2ecc71!important;

animation:correcto .6s;


}



.fallo{


background:#e74c3c!important;

animation:fallo .5s;


}



@keyframes correcto{


50%{

transform:scale(1.15);

}


}



@keyframes fallo{


25%{

transform:translateX(-12px);

}


50%{

transform:translateX(12px);

}


75%{

transform:translateX(-12px);

}


}




#juego,#pro{

display:none;

}


</style>

</head>


<body>


<audio id="musicaFondo" src="lofi.mp3" loop></audio>

<audio id="sonidoGanador" src="ganador.mp3"></audio>

<audio id="sonidoError" src="incorrecto.mp3"></audio>


<header>

<h1>🔥 Juego Matemático 🔥</h1>

</header>


<div id="practicas" class="practicas">


<div class="box">


<h2>➕ Suma</h2>


<div id="pregS" class="pregunta"></div>


<div id="opcionesS" class="opciones"></div>


<div id="resSuma"></div>


</div>


<div class="box">


<h2>➖ Resta</h2>


<div id="pregR" class="pregunta"></div>


<div id="opcionesR" class="opciones"></div>


<div id="resResta"></div>


</div>


</div>


<button onclick="iniciarJuego()">

🎯 Juego 20 preguntas

</button>


<button onclick="iniciarPro()">

🚀 Modo PRO

</button>
<!-- JUEGO 20 PREGUNTAS -->


<div id="juego" class="box">


<h2>🎯 Juego de 20 preguntas</h2>


<p>

Pregunta <span id="nJ">1</span>/20

</p>



<div id="pregJ" class="pregunta"></div>



<div id="opcionesJ" class="opciones"></div>



<div id="resJ"></div>




<div id="finJ" style="display:none;">


<h3 id="puntJ"></h3>


<button onclick="iniciarJuego()">

Reiniciar

</button>


</div>




<button id="sigJ" onclick="sigJuego()" disabled>

Siguiente

</button>



<button class="btn-rojo" onclick="volver()">

Volver

</button>


</div>








<!-- MODO PRO -->



<div id="pro" class="box">



<h2>🚀 Modo PRO</h2>


<p>💥 Cada respuesta suma puntos</p>



<p>

Pregunta: <span id="nP">1</span>

</p>



<p>

Puntos: <span id="pts">0</span>

</p>



<p>

Récord: <span id="rec">0</span>

</p>




<div id="ran"></div>




<div id="pregP" class="pregunta"></div>




<div id="opcionesP" class="opciones"></div>




<div id="resP"></div>




<button id="sigP" onclick="sigPro()" disabled>

Siguiente

</button>




<button class="btn-rojo" onclick="volver()">

Volver

</button>



<button onclick="iniciarPro()">

Reiniciar

</button>



</div>








<script>


/* MUSICA DE FONDO */

document.body.addEventListener("click",function(){

let musica=document.getElementById("musicaFondo");

if(musica.paused){

musica.play();

}

},{once:true});






/* FONDO ANIMADO */


setInterval(()=>{


document.body.style.background=

`linear-gradient(45deg,
hsl(${Math.random()*360},80%,80%),
hsl(${Math.random()*360},80%,90%))`;


},4000);









/* CREAR RESPUESTAS */


function crearOpciones(id,correcta,accion){



let caja=document.getElementById(id);



let respuestas=[correcta];



while(respuestas.length<5){



let n=correcta + Math.floor(Math.random()*15)-7;



if(n>=0 && !respuestas.includes(n)){



respuestas.push(n);



}



}




respuestas.sort(()=>Math.random()-0.5);




caja.innerHTML="";



let letras=["A","B","C","D","E"];




respuestas.forEach((r,i)=>{



let boton=document.createElement("div");



boton.className="opcion";



boton.innerHTML=letras[i]+") "+r;





boton.onclick=function(){



let botones=document.querySelectorAll("#"+id+" .opcion");



botones.forEach(b=>{


b.style.pointerEvents="none";


});





if(r==correcta){



boton.classList.add("correcta");


document.getElementById("sonidoGanador").currentTime=0;

document.getElementById("sonidoGanador").play();



}else{



boton.classList.add("fallo");


document.getElementById("sonidoError").currentTime=0;

document.getElementById("sonidoError").play();



botones.forEach(b=>{



if(b.innerHTML.includes(correcta)){



b.classList.add("correcta");


}



});



}




setTimeout(()=>{



accion(r==correcta);



},900);



};




caja.appendChild(boton);



});



}



/* PRACTICAS */


let sumaOk;

let restaOk;




function nuevaSuma(){



let a=Math.floor(Math.random()*10)+1;

let b=Math.floor(Math.random()*10)+1;



sumaOk=a+b;



pregS.innerHTML=a+" + "+b;



crearOpciones("opcionesS",sumaOk,(bien)=>{



resSuma.innerHTML=bien?"✔ Correcto":"❌ Incorrecto";



setTimeout(nuevaSuma,800);



});



}





function nuevaResta(){



let a=Math.floor(Math.random()*20)+5;


let b=Math.floor(Math.random()*(a+1));



restaOk=a-b;



pregR.innerHTML=a+" - "+b;




crearOpciones("opcionesR",restaOk,(bien)=>{



resResta.innerHTML=bien?"✔ Correcto":"❌ Incorrecto";



setTimeout(nuevaResta,800);



});



}





/* JUEGO 20 PREGUNTAS */


let preguntaJ=1;

let puntosJ=0;

let respuestaJ;




function generarPreguntaJ(){



let a=Math.floor(Math.random()*15)+1;

let b=Math.floor(Math.random()*15)+1;




if(Math.random()>0.5){



respuestaJ=a+b;


pregJ.innerHTML=a+" + "+b;



}else{



let mayor=Math.max(a,b);

let menor=Math.min(a,b);



respuestaJ=mayor-menor;



pregJ.innerHTML=mayor+" - "+menor;



}





crearOpciones("opcionesJ",respuestaJ,(bien)=>{



if(bien){



puntosJ++;


resJ.innerHTML="✔ Correcto";


}else{


resJ.innerHTML="❌ Incorrecto";


}




setTimeout(()=>{



if(preguntaJ>=20){



finJ.style.display="block";


puntJ.innerHTML="Puntaje: "+puntosJ+"/20";


return;


}




preguntaJ++;



nJ.innerHTML=preguntaJ;



generarPreguntaJ();



},900);



});



}






function iniciarJuego(){



practicas.style.display="none";

pro.style.display="none";


juego.style.display="block";



preguntaJ=1;

puntosJ=0;



nJ.innerHTML=1;



finJ.style.display="none";



generarPreguntaJ();



}







function sigJuego(){



}









/* MODO PRO */



let puntos=0;

let racha=0;

let respuestaP;

let record=localStorage.getItem("record")||0;





function rango(p){


if(p<100)return "Principiante";


if(p<200)return "Aprendiz";


if(p<300)return "Intermedio";


if(p<500)return "Experto";


return "Matemático";



}








function generarPreguntaP(){



let max=10+(racha*3);



let a=Math.floor(Math.random()*max)+1;

let b=Math.floor(Math.random()*max)+1;




if(Math.random()>0.5){



respuestaP=a+b;


pregP.innerHTML=a+" + "+b;



}else{



let mayor=Math.max(a,b);


let menor=Math.min(a,b);



respuestaP=mayor-menor;



pregP.innerHTML=mayor+" - "+menor;



}






crearOpciones("opcionesP",respuestaP,(bien)=>{



if(bien){


puntos+=20;


racha++;


resP.innerHTML="🔥 Correcto +20";



}else{



puntos=0;


racha=0;


resP.innerHTML="💥 Fallaste";



}





actualizar();



setTimeout(()=>{


nP.innerHTML=parseInt(nP.innerHTML)+1;



generarPreguntaP();



},900);




});




}








function iniciarPro(){



practicas.style.display="none";


juego.style.display="none";


pro.style.display="block";



puntos=0;


racha=0;



nP.innerHTML=1;



actualizar();



generarPreguntaP();



}






function sigPro(){



}






function actualizar(){



pts.innerHTML=puntos;



rec.innerHTML=record;



ran.innerHTML="Rango: "+rango(puntos);





if(puntos>record){



record=puntos;



localStorage.setItem("record",record);



}



}







/* VOLVER */


function volver(){



juego.style.display="none";


pro.style.display="none";


practicas.style.display="flex";



}






/* INICIAR */



nuevaSuma();

nuevaResta();



</script>


</body>


</html>
